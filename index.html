<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">

    <title>stardewOS</title>
</head>

<body>
    <audio id="heartbeat" src="/pika.mp3" preload="auto">
    </audio>

    <!-- <section class="booting" id="bootSection">
        <div>
            <h1>
                <img src="img/loading-junimo.gif" alt="" srcset="" class="gif-loading"><br>
                Loading...
            </h1>
        </div>
    </section> -->

    <main class="desktop">
        <img src="img/cloud1.png" class="cloud1">
        <img src="img/cloud2.png" class="cloud2">
        <img src="img/cloud3.png" class="cloud3">
        <img src="img/cloud4.png" class="cloud4">
        <section class="window" id="folder">

            <header class="window-header" id="folderHeader">
                <section class="buttons">
                    <span class="maximize"></span>
                    <span class="minimize" onclick="maximizeHandler('folder')"></span>
                    <span class="close" onclick="windowHandler('folder')"></span>
                </section>
                <span class="window-name">Deleted Items</span>
            </header>

            <section class="window-content folder">

                <aside>

                </aside>

                <main>

                    <ul class="icons">

                        <li class="icon">
                            <img src="img/cyberpunk-icon.png">
                            <h1>Cyberpunk</h1>
                        </li>

                        <li class="icon">
                            <img src="img/bf4-icon.png">
                            <h1>Battlefield 4</h1>
                        </li>

                    </ul>

                </main>

            </section>

        </section>

        <section class="window hidded" id="wiki">

            <header class="window-header" id="wikiHeader">
                <section class="buttons">
                    <span class="maximize"></span>
                    <span class="minimize" onclick="maximizeHandler('wiki')"></span>
                    <span class="close" onclick="windowHandler('wiki')"></span>
                </section>
                <span class="window-name">Stardew Valley Wiki</span>
            </header>
            <iframe src="https://stardewvalleywiki.com/Stardew_Valley_Wiki" frameborder="0"></iframe>

        </section>
        <section class="window hidded" id="browser">

            <header class="window-header" id="browserHeader">
                <section class="buttons">
                    <span class="maximize"></span>
                    <span class="minimize" onclick="maximizeHandler('browser')"></span>
                    <span class="close" onclick="windowHandler('browser')"></span>
                </section>
                <span class="window-name">Browser</span>
            </header>
            <iframe src="https://www.bing.com/?cc=br" frameborder="0"></iframe>

        </section>

        <section class="window hidded" id="map">

            <header class="window-header" id="mapHeader">
                <section class="buttons">
                    <span class="maximize"></span>
                    <span class="minimize" onclick="maximizeHandler('map')"></span>
                    <span class="close" onclick="windowHandler('map')"></span>
                </section>
                <span class="window-name">Stardew Valley Map Planner</span>
            </header>
            <iframe src="https://stardew.info/planner/" loading="lazy"></iframe>

        </section>

        <section class="window hidded" id="code">

            <header class="window-header" id="codeHeader">
                <section class="buttons">
                    <span class="close" onclick="windowHandler('code')"></span>
                    <span class="minimize" onclick="maximizeHandler('code')"></span>
                    <span class="maximize"></span>
                </section>
                <span class="window-name">Code</span>
            </header>
            <iframe src="https://github.com/FernandoBade/stardewOS" id="stackBlitz" loading="lazy"></iframe>

        </section>


        <section id="play" class="current-date">

            <img class="gif-date" id="chicken-gif" src="img/chicken-gif.gif">
            <span class="time">
                <span id="currentHour"></span>:<span id="currentMinute"></span>
            </span>
            <span class="date">
                <span id="currentDay"></span>/<span id="currentMonth"></span>/<span id="currentYear"></span>
            </span>
        </section>

        <ul class="icons">


            <li class="icon" onclick="windowHandler('wiki')">
                <img src="img/house.png">
                <h1>Stardew Wiki</h1>
            </li>

            <li class="icon" onclick="windowHandler('map')">
                <img src="img/Robin.png">
                <h1>Map Planner</h1>

            </li>

            <li class="icon" onclick="windowHandler('browser')">
                <img src="img/Abigail.png">
        
                <h1>Browser</h1>

            </li>

            <li class="icon" onclick="windowHandler('folder')">
                <img src="img/joja.png">
                <h1>Recycle Bin</h1>
            </li>
        </ul>

    </main>

    <footer>
        <section class="icon-wrapper">
            Recently Played:
            <img src="img/game1.png">
            <img src="img/game2.png">
            <img src="img/game3.png">
            <img src="img/game4.png">

        </section>
    </footer>

    <script src="./main.js"></script>

</body>

</html>
