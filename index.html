<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>

    <title>stardewOS</title>
</head>

<body>
    <audio id="heartbeat" src="/pika.mp3" preload="auto">
    </audio>

    <main class="desktop">
        <!-- <img src="img/cloud1.png" class="cloud1"> -->
        <img src="img/cloud2.png" class="cloud2">
        <img src="img/cloud3.png" class="cloud3">
        <!-- <img src="img/cloud3.png" class="cloud4"> -->

        <section class="window" id="computer">

            <header class="window-header" id="computerHeader">
                <section class="buttons">
                    <span class="minimize" onclick="maximizeHandler('computer')">
                        <img src="img/maximize.png" alt="">
                    </span>
                    <span class="close" onclick="windowHandler('computer')">
                        <img src="img/close.png">
                    </span>
                </section>
                <span class="window-name">Robin's PC</span>
            </header>

            <section class="window-content computer">

                <aside>
                    <div class="user">
                        <img src="img/user.png">
                    </div>

                    <div>
                        <p>
                            <img src="img/star.png">
                            favorites
                        </p>
                        <p>
                            <img src="img/dwarf.png">
                            C:/system
                        </p>
                        <p>
                            <img src="img/pc.png">
                            computer
                        </p>
                        <p>
                            <img src="img/folder.png">
                            documents
                        </p>
                        <p>
                            <img src="img/files.png">
                            files
                        </p>

                        <p>
                            <img src="img/trash.png">
                            trash
                        </p>
                    </div>
                </aside>

                <main>

                    <ul class="icons">

                        <li class="icon">
                            <img src="img/cyberpunk-icon.png">
                            <h1>Cyberpunk</h1>
                        </li>

                        <li class="icon">
                            <img src="img/bf4-icon.png">
                            <h1>Battlefield</h1>
                        </li>

                    </ul>

                </main>

            </section>

        </section>


        <section class="window" id="folder">

            <header class="window-header" id="folderHeader">
                <section class="buttons">
                    <span class="minimize" onclick="maximizeHandler('folder')">
                        <img src="img/maximize.png" alt="">
                    </span>
                    <span class="close" onclick="windowHandler('folder')">
                        <img src="img/close.png">
                    </span>
                </section>
                <span class="window-name">Robin's PC</span>
            </header>

            <section class="window-content folder">

                <aside>

                </aside>

                <main>

                    <ul class="icons">

                        <li class="icon">
                            <img src="img/cyberpunk-icon.png">
                            <h1>Cyberpunk</h1>
                        </li>

                        <li class="icon">
                            <img src="img/bf4-icon.png">
                            <h1>Battlefield</h1>
                        </li>

                    </ul>

                </main>

            </section>

        </section>

        <section class="window hidded" id="wiki">

            <header class="window-header" id="wikiHeader">
                <section class="buttons">
                    <span class="minimize" onclick="maximizeHandler('wiki')">
                        <img src="img/maximize.png" alt="">
                    </span>
                    <span class="close" onclick="windowHandler('wiki')">
                        <img src="img/close.png">
                    </span>
                </section>
                <span class="window-name">Stardew Valley Wiki</span>
            </header>
            <iframe src="https://stardewvalleywiki.com/Stardew_Valley_Wiki" frameborder="0"></iframe>

        </section>
        <section class="window hidded" id="browser">

            <header class="window-header" id="browserHeader">
                <section class="buttons">
                    <span class="minimize" onclick="maximizeHandler('browser')">
                        <img src="img/maximize.png" alt="">
                    </span>
                    <span class="close" onclick="windowHandler('browser')">
                        <img src="img/close.png">
                    </span>
                </section>
                <span class="window-name">Bing</span>
            </header>
            <iframe src="https://www.bing.com/?cc=br" frameborder="0"></iframe>

        </section>

        <section class="window hidded" id="map">

            <header class="window-header" id="mapHeader">
                <section class="buttons">
                    <span class="minimize" onclick="maximizeHandler('map')">
                        <img src="img/maximize.png" alt="">
                    </span>
                    <span class="close" onclick="windowHandler('map')">
                        <img src="img/close.png">
                    </span>
                </section>
                <span class="window-name">Stardew Valley Map Planner</span>
            </header>
            <iframe src="https://stardew.info/planner/" loading="lazy"></iframe>

        </section>

            <div class="player">

                <img id="backImage" src="img/song-prev.png">

                <img id="swapImage" src="img/song1.png">

                <img id="nextImage" src="img/song-next.png">

                <img id="stopImage" class="stopImage" src="img/music-off.png">
            </div>
            <div class="playlist">
                <div class="song" url="audio/0.mp3">
                </div>
                <div class="song" url="audio/1.mp3">
                </div>
                <div class="song" url="audio/2.mp3">
                </div>
            </div>
        </section> -->


        <section id="play" class="current-date">

            <span class="time">
                <span id="currentHour"></span>:<span id="currentMinute"></span>
            </span>
            <span class="date">
                <span id="currentDay"></span>/<span id="currentMonth"></span>/<span id="currentYear"></span>
            </span>
        </section>
        <section class="subicon">
            <ul class="icons">


                <li class="icon">
                    <img src="img/pc.png" onclick="windowHandler('computer')">
                    <h1>computer</h1>
                </li>
                <li class="icon">
                    <img src="img/folder.png">
                    <h1>documents</h1>
                </li>
                <li class="icon">
                    <img src="img/files.png">
                    <h1>files</h1>
                </li>
                <li class="icon">
                    <img src="img/trash.png" onclick="windowHandler('folder')">
                    <h1>trash</h1>
                </li>
                <li class="icon">
                    <img src="img/avast.png">
                    <h1>antivirus</h1>
                </li>

            </ul>
            <!-- <ul class="icons">


                <li class="icon">
                    <img src="img/house.png">
                    <h1>Stardew Wiki</h1>
                </li>
                <li class="icon">
                    <img src="img/house.png">
                    <h1>Stardew Wiki</h1>
                </li>
                <li class="icon">
                    <img src="img/house.png">
                    <h1>Stardew Wiki</h1>
                </li>
                <li class="icon">
                    <img src="img/house.png">
                    <h1>Stardew Wiki</h1>
                </li>
                <li class="icon">
                    <img src="img/house.png">
                    <h1>Stardew Wiki</h1>
                </li>
            </ul> -->
        </section>
    </main>

    <footer>

        <section class="icon-wrapper">
            <section class="radioPlayer">
                <div class="player">

                    <img id="backImage" src="img/song-prev.png">

                    <img id="swapImage" src="img/song1.png">

                    <img id="nextImage" src="img/song-next.png">

                    <img id="stopImage" class="stopImage" src="img/music-off.png">
                </div>
                <div class="playlist">
                    <div class="song" url="audio/0.mp3">
                    </div>
                    <div class="song" url="audio/1.mp3">
                    </div>
                    <div class="song" url="audio/2.mp3">
                    </div>
                    <div class="song" url="audio/3.mp3">
                    </div>
                    <div class="song" url="audio/4.mp3">
                    </div>
                </div>
            </section>
            <img src="img/m2.png" onclick="windowHandler('wiki')">
            <img src="img/m3.png" onclick="windowHandler('browser')">
            <img src="img/m1.png" onclick="windowHandler('map')">
            <img src="img/m4.png">


        </section>
    </footer>

    <script src="scripts/main.js"></script>
    <script src="scripts/audioPlayer.js"></script>

</body>

</html>
